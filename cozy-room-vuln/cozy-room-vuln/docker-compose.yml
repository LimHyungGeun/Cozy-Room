version: '3.8'

services:
  db:
    build: ./db
    container_name: cozyroom_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: C0zyR00m!SecureDB
      MYSQL_DATABASE: cozyroom
      MYSQL_USER: cozyapp
      MYSQL_PASSWORD: App@C0zy2017!
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - cozy_network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  web:
    build: ./web
    container_name: cozyroom_web
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: cozyroom
      DB_USER: cozyapp
      DB_PASSWORD: App@C0zy2017!
      SECRET_KEY: cozy_secret_2017_yogi_eottae
      UPLOAD_FOLDER: /app/static/uploads
    ports:
      - "5000:5000"
    volumes:
      - ./web/static/uploads:/app/static/uploads
    depends_on:
      - db
    networks:
      - cozy_network

networks:
  cozy_network:
    driver: bridge

volumes:
  db_data:
