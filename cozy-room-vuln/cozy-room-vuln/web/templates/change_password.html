{% extends 'base.html' %}
{% block title %}비밀번호 변경 — COZY ROOM{% endblock %}
{% block head %}
<style>
  .my-layout { display:grid; grid-template-columns:220px 1fr; gap:32px; padding:48px 0; }
  .sidebar-nav { position:sticky; top:80px; }
  .sidebar-nav-title { font-size:9px; letter-spacing:.25em; text-transform:uppercase; color:var(--gray); margin-bottom:16px; }
  .sidebar-nav-item { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:2px; font-size:13px; color:var(--gray-light); transition:all .2s; margin-bottom:4px; }
  .sidebar-nav-item:hover, .sidebar-nav-item.active { background:rgba(201,168,76,.08); color:var(--gold); }
  .pw-card { background:var(--dark2); border:1px solid var(--dark3); border-radius:4px; padding:32px; max-width:480px; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h1 class="page-header-title">마이페이지</h1>
  </div>
</div>
<div class="container">
  <div class="my-layout">
    <div class="sidebar-nav">
      <div class="sidebar-nav-title">마이메뉴</div>
      <a href="{{ url_for('my_bookings') }}" class="sidebar-nav-item">🏨 내 예약 내역</a>
      <a href="{{ url_for('my_profile') }}" class="sidebar-nav-item">👤 프로필 설정</a>
      <a href="{{ url_for('my_coupon') }}" class="sidebar-nav-item">🎟️ 쿠폰</a>
      <a href="{{ url_for('change_password') }}" class="sidebar-nav-item active">🔒 비밀번호 변경</a>
      <a href="{{ url_for('booking_check') }}" class="sidebar-nav-item">🔍 예약 조회</a>
      <hr class="divider" style="margin:16px 0;">
      <a href="{{ url_for('logout') }}" class="sidebar-nav-item" style="color:var(--gray);">🚪 로그아웃</a>
    </div>
    <div>
      <div class="pw-card">
        <div style="font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); margin-bottom:20px;">비밀번호 변경</div>
        <form method="post">
          <div class="form-group">
            <label class="form-label">현재 비밀번호</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">새 비밀번호 (8자 이상)</label>
            <input type="password" name="new_password" class="form-control" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">새 비밀번호 확인</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-gold btn-block">비밀번호 변경</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
