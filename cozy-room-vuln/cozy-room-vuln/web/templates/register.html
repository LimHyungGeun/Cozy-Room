{% extends 'base.html' %}
{% block title %}회원가입 — COZY ROOM{% endblock %}
{% block head %}
<style>
  .register-page {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #111111 0%, #0a0a0a 100%);
    padding: 80px 24px;
  }
  .register-card {
    width: 100%; max-width: 560px;
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 4px; padding: 48px;
  }
  .auth-logo { font-family:'Playfair Display',serif; font-size:22px; letter-spacing:.18em; color:var(--gold); text-align:center; margin-bottom:8px; }
  .auth-subtitle { text-align:center; font-size:13px; color:var(--gray); margin-bottom:40px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .step-indicator {
    display:flex; gap:8px; margin-bottom:32px;
  }
  .step { flex:1; height:3px; background:var(--dark4); border-radius:2px; }
  .step.active { background:var(--gold); }
  .agree-item {
    display:flex; align-items:flex-start; gap:12px;
    padding:12px 0; border-bottom:1px solid var(--dark3);
    font-size:13px; color:var(--gray-light);
  }
  .agree-item input[type=checkbox] { margin-top:2px; accent-color:var(--gold); width:16px; height:16px; flex-shrink:0; }
  .agree-item a { color:var(--gold); }
  .password-strength {
    height:3px; background:var(--dark4);
    border-radius:2px; margin-top:6px;
    overflow:hidden;
  }
  .password-strength-bar {
    height:100%; width:0;
    transition:width .3s, background .3s;
    border-radius:2px;
  }
</style>
{% endblock %}

{% block content %}
<div class="register-page">
  <div class="register-card">
    <div class="auth-logo">Cozy Room</div>
    <div class="auth-subtitle">회원가입 후 더 많은 혜택을 누리세요</div>

    <div class="step-indicator">
      <div class="step active"></div>
      <div class="step active"></div>
      <div class="step"></div>
    </div>

    <form method="post" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">아이디 <span style="color:var(--red)">*</span></label>
          <input type="text" name="username" class="form-control" placeholder="4~20자 영문/숫자" required minlength="4" maxlength="20">
        </div>
        <div class="form-group">
          <label class="form-label">이름 <span style="color:var(--red)">*</span></label>
          <input type="text" name="name" class="form-control" placeholder="실명을 입력하세요" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">이메일 <span style="color:var(--red)">*</span></label>
        <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">비밀번호 <span style="color:var(--red)">*</span></label>
          <input type="password" name="password" class="form-control" placeholder="8자 이상" required id="pw" minlength="8">
          <div class="password-strength"><div class="password-strength-bar" id="pwBar"></div></div>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 확인 <span style="color:var(--red)">*</span></label>
          <input type="password" name="password2" class="form-control" placeholder="동일하게 입력" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">휴대폰 번호 <span style="color:var(--red)">*</span></label>
        <input type="tel" name="phone" class="form-control" placeholder="010-0000-0000" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">생년월일</label>
          <input type="date" name="birth_date" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">주소</label>
          <input type="text" name="address" class="form-control" placeholder="주소 (선택)">
        </div>
      </div>

      <hr class="divider">

      <div class="agree-item">
        <input type="checkbox" id="agreeAll" onchange="toggleAll(this)">
        <label for="agreeAll" style="font-weight:500; color:var(--white); cursor:pointer;">전체 동의</label>
      </div>
      <div class="agree-item">
        <input type="checkbox" name="agree_terms" required class="agree-check">
        <label>
          <a href="{{ url_for('terms') }}" target="_blank">이용약관</a> 동의 <span style="color:var(--red);">(필수)</span>
        </label>
      </div>
      <div class="agree-item">
        <input type="checkbox" name="agree_privacy" required class="agree-check">
        <label>
          <a href="{{ url_for('privacy') }}" target="_blank">개인정보 수집·이용</a> 동의 <span style="color:var(--red);">(필수)</span>
        </label>
      </div>
      <div class="agree-item">
        <input type="checkbox" name="agree_marketing" class="agree-check">
        <label>마케팅 정보 수신 동의 <span style="color:var(--gray);">(선택)</span></label>
      </div>

      <button type="submit" class="btn btn-gold btn-block btn-lg" style="margin-top:32px;">회원가입 완료</button>
    </form>

    <div style="text-align:center; margin-top:24px; font-size:13px; color:var(--gray);">
      이미 회원이신가요?
      <a href="{{ url_for('login') }}" style="color:var(--gold); margin-left:4px;">로그인</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const pw = document.getElementById('pw');
  const bar = document.getElementById('pwBar');
  pw.addEventListener('input', () => {
    const v = pw.value;
    let strength = 0;
    if(v.length >= 8) strength++;
    if(/[A-Z]/.test(v)) strength++;
    if(/[0-9]/.test(v)) strength++;
    if(/[^a-zA-Z0-9]/.test(v)) strength++;
    const colors = ['#cc4444','#e8a04a','#c9a84c','#4a8c5c'];
    const widths = ['25%','50%','75%','100%'];
    bar.style.width = widths[strength-1] || '0';
    bar.style.background = colors[strength-1] || 'transparent';
  });

  function toggleAll(el) {
    document.querySelectorAll('.agree-check').forEach(c => c.checked = el.checked);
  }
</script>
{% endblock %}
